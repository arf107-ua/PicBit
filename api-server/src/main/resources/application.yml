spring:
  application:
    name: api-server

  # ── PostgreSQL (Supabase) ─────────────────────────────────────────
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      idle-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # ── MongoDB ───────────────────────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGODB_URI}

  # ── RabbitMQ ──────────────────────────────────────────────────────
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto

  # ── Multipart ────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

# ── Supabase Storage ─────────────────────────────────────────────────
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_SERVICE_KEY}
  storage:
    bucket: ${SUPABASE_BUCKET:picflow-images}

# ── JWT ───────────────────────────────────────────────────────────────
jwt:
  # Min 32 chars for HS256. In production use a long random string in .env
  secret: ${JWT_SECRET:my-super-secret-key-change-in-production-32chars}
  expiration-ms: 86400000   # 24 hours

# ── Servidor ─────────────────────────────────────────────────────────
server:
  port: 8080

# ── Logging ──────────────────────────────────────────────────────────
logging:
  level:
    com.imagepipeline: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.security: INFO